name: BookMyShow Theater Watcher

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      force_mock_venue:
        description: 'Force a mock venue to test notifications and state commits'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  check-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run check script
        env:
          FORCE_MOCK_VENUE: ${{ github.event.inputs.force_mock_venue }}
        run: python check.py

      - name: Commit and push state changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet state.json || (git add state.json && git commit -m "update state.json - venue check" && git push)
